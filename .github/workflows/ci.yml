name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          additional_files: install.sh uninstall.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check log-session.py summary.py

  test-scripts:
    name: "Scripts (${{ matrix.os }}, jq=${{ matrix.jq }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        jq: [true, false]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Remove jq
        if: matrix.jq == false
        run: |
          if command -v apt-get &>/dev/null; then
            sudo apt-get remove -y jq
          elif command -v brew &>/dev/null; then
            brew uninstall --ignore-dependencies jq || true
          fi

      - name: Run install.sh
        run: bash install.sh -y

      - name: Verify install results
        run: |
          echo "--- Checking installed files ---"
          test -f ~/.claude/hooks/log-session.py
          test -f ~/.claude/skills/weekly-review/SKILL.md
          test -f ~/.claude/skills/prompt-deep-dive/SKILL.md
          test -f ~/.claude/skills/export-review/SKILL.md
          test -f ~/.claude/settings.json
          test -f ~/.claude/learning-backlog.md
          echo "All files present."

      - name: Verify settings.json hook registration
        if: matrix.jq == true
        run: |
          grep -q "log-session.py" ~/.claude/settings.json
          echo "Hook registered in settings.json."

      - name: Idempotency test (re-run install)
        run: bash install.sh -y

      - name: Run uninstall.sh
        run: printf 'N\nN\nN\n' | bash uninstall.sh

      - name: Verify uninstall results
        run: |
          echo "--- Checking removed files ---"
          test ! -f ~/.claude/hooks/log-session.py
          test ! -d ~/.claude/skills/weekly-review
          test ! -d ~/.claude/skills/prompt-deep-dive
          test ! -d ~/.claude/skills/export-review
          test -f ~/.claude/learning-backlog.md  # default N = kept
          echo "All files removed."

  test-python:
    name: "Python (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: log-session.py smoke test
        shell: bash
        run: |
          echo '{"session_id":"test-123","transcript_path":"","cwd":"/tmp"}' | python3 log-session.py

      - name: summary.py smoke test
        shell: bash
        run: python3 summary.py --help
